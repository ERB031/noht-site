backend:
  name: github
  repo: ERB031/noht-site
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "work"
    label: "Work / Portfolio"
    folder: "content/work"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["film", "commercial", "music-video", "nonprofit"] }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Video URL", name: "video_url", widget: "string", required: false, hint: "Paste a Vimeo or YouTube URL (e.g. https://vimeo.com/123456 or https://youtube.com/watch?v=abc)" }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Additional images for this project"
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Order", name: "order", widget: "number", default: 0, hint: "Lower numbers appear first" }

  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
